<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TaskFlow{% endblock %} | Django Todo App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom checkbox styling */
        .task-checkbox:checked + .task-label {
            text-decoration: line-through;
            color: #9ca3af;
        }
        /* Smooth transitions */
        .task-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        /* Progress bar animation */
        .progress-fill {
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Fade in animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }
        /* Staggered animation for task items */
        .task-card:nth-child(1) { animation-delay: 0.0s; }
        .task-card:nth-child(2) { animation-delay: 0.05s; }
        .task-card:nth-child(3) { animation-delay: 0.1s; }
        .task-card:nth-child(4) { animation-delay: 0.15s; }
        .task-card:nth-child(5) { animation-delay: 0.2s; }
        .task-card:nth-child(6) { animation-delay: 0.25s; }
        .task-card:nth-child(7) { animation-delay: 0.3s; }
        .task-card:nth-child(8) { animation-delay: 0.35s; }
        /* Pulse for high priority */
        @keyframes priorityPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .priority-pulse {
            animation: priorityPulse 2s ease-in-out infinite;
        }
        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-indigo-50 to-purple-50 min-h-screen">

    <!-- Navigation Bar -->
    <nav class="bg-white/80 backdrop-blur-lg shadow-sm border-b border-indigo-100 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo / Brand -->
                <a href="{% url 'task-list' %}" class="flex items-center space-x-2 group">
                    <div class="w-9 h-9 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200 group-hover:shadow-indigo-300 transition-shadow">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                        </svg>
                    </div>
                    <span class="text-xl font-bold gradient-text">TaskFlow</span>
                </a>

                <!-- Add Task Button -->
                <a href="{% url 'task-create' %}" class="inline-flex items-center px-4 py-2 bg-gradient-to-r from-indigo-500 to-purple-600 text-white text-sm font-semibold rounded-xl hover:from-indigo-600 hover:to-purple-700 shadow-lg shadow-indigo-200 hover:shadow-indigo-300 transition-all duration-200 transform hover:-translate-y-0.5">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    New Task
                </a>
            </div>
        </div>
    </nav>

    <!-- Messages -->
    {% if messages %}
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 mt-4">
        {% for message in messages %}
        <div class="animate-fade-in-up mb-2 p-4 rounded-xl flex items-center space-x-3
            {% if message.tags == 'success' %}
                bg-emerald-50 border border-emerald-200 text-emerald-800
            {% elif message.tags == 'info' %}
                bg-blue-50 border border-blue-200 text-blue-800
            {% elif message.tags == 'warning' %}
                bg-amber-50 border border-amber-200 text-amber-800
            {% elif message.tags == 'error' %}
                bg-red-50 border border-red-200 text-red-800
            {% else %}
                bg-gray-50 border border-gray-200 text-gray-800
            {% endif %}">
            {% if message.tags == 'success' %}
                <svg class="w-5 h-5 text-emerald-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            {% elif message.tags == 'info' %}
                <svg class="w-5 h-5 text-blue-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            {% endif %}
            <span class="text-sm font-medium">{{ message }}</span>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="mt-12 border-t border-indigo-100 bg-white/50 backdrop-blur-sm">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex flex-col sm:flex-row items-center justify-between text-sm text-gray-500">
                <p>TaskFlow &mdash; Built with Django 6 & Tailwind CSS</p>
                <p class="mt-2 sm:mt-0">Simple. Clean. Done.</p>
            </div>
        </div>
    </footer>

</body>
</html>
